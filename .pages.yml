content:
  - name: portfolio
    label: "포트폴리오 내용"
    type: file
    path: data.json
    fields:
      - name: bold_names
        label: "자동으로 굵게 표시할 저자 이름"
        type: string
        list: true
        description: "여기에 적은 이름은 모든 논문 저자 목록에서 자동으로 굵게 표시됩니다. (예: Dongwon Seo)"
      - name: profile
        label: "프로필"
        type: object
        fields:
          - name: name
            label: "이름 (표시용)"
            type: string
          - name: english_name
            label: "영문 이름 (상단/푸터)"
            type: string
          - name: affiliation
            label: "소속"
            type: text
          - name: body
            label: "소개글"
            type: text
          - name: avatar
            label: "프로필 사진 URL"
            type: string
          - name: cv_link
            label: "CV 링크 URL"
            type: string
          - name: google_scholar
            label: "Google Scholar URL"
            type: string
          - name: email
            label: "이메일"
            type: string
          - name: linkedin
            label: "LinkedIn URL (없으면 # 입력)"
            type: string
      - name: publications
        label: "논문 및 저서"
        type: object
        list: true
        fields:
          - name: year
            label: "연도"
            type: string
          - name: title
            label: "제목"
            type: text
          - name: authors
            label: "저자"
            type: text
            description: "그냥 평문으로 입력하세요. 위에서 지정한 이름은 자동으로 굵게 표시됩니다."
          - name: journal_name
            label: "저널 / 학회 이름"
            type: string
            description: "이 이름은 자동으로 강조 서식(이탤릭 색상)으로 표시됩니다."
          - name: journal_info
            label: "저널 추가 정보"
            type: string
            description: "예) (2023 IF: 13.0, JCR Top 10%). 없으면 비워두세요."
          - name: link_text
            label: "링크 텍스트"
            type: string
            description: "예) DOI. 링크가 없으면 비워두세요."
          - name: link_url
            label: "링크 URL"
            type: string
            description: "링크가 없으면 비워두세요."
      - name: conferences
        label: "학회 활동"
        type: object
        list: true
        fields:
          - name: title
            label: "제목"
            type: string
          - name: description
            label: "설명"
            type: text
      - name: education
        label: "학업"
        type: object
        list: true
        fields:
          - name: title
            label: "학위 / 과정"
            type: string
          - name: description
            label: "설명"
            type: text
      - name: awards
        label: "수상 및 장학"
        type: object
        list: true
        fields:
          - name: title
            label: "수상명"
            type: string
          - name: description
            label: "설명"
            type: text
